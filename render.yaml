# Render Blueprint — New → Blueprint → conectar o repositório GitHub.
# Documentação: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: aurea-studio
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client
    startCommand: NODE_ENV=production npm start --prefix server
    healthCheckPath: /api/health
    envVars:
      # Obrigatório para o Express servir o build do React (client/dist)
      - key: NODE_ENV
        value: production
      # Opcional: pasta da base SQLite (use com Disco Render montado neste caminho)
      # - key: DATA_DIR
      #   value: /data
      # Opcional: CORS restrito (URL exata do front, só se front ≠ este serviço)
      # - key: CORS_ORIGIN
      #   value: https://aurea-studio.onrender.com
